baseURL = 'https://cialloking.github.io/' #本地运行重定向时先删除主域名运行再添加回来
#baseURL = 'http://localhost:1313/'
theme = 'hugo-theme-reimu'
defaultContentLanguage = 'zh-CN'
enableEmoji = 'true'
[languages]
[languages.zh-CN]
languageCode = 'zh-CN'
languageName = '简体中文'
weight = 1
hasCJKLanguage = true
title = 'CialloKing 的博客'
author = 'CialloKingx'

[languages.en]
languageCode = 'en'
languageName = 'English'
weight = 2
hasCJKLanguage = true
title = 'CialloKing Blog'
author = 'CialloKing'

#[languages.ja]
#languageCode = 'ja'
#languageName = '日本語'
#weight = 3
#hasCJKLanguage = 'true'
#title = 'xxxx'                                      # 自己编辑
#author = 'xxxx'                                     # 自己编辑

[markup.highlight]
guessSyntax = true
noClasses = false

[markup.goldmark.extensions.passthrough]
enable = true
delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
delimiters.inline = [["\\(", "\\)"], ["$", "$"]]

[outputs]
home = ["Algolia", "HTML", "RSS", "JSON", "SEARCH"]
#home = ["HTML", "RSS", "JSON", "SEARCH"]


[outputFormats.Algolia]
baseName = "algolia"
isPlainText = true
mediaType = "application/json"
notAlternative = true

[outputFormats.SEARCH]
  baseName = "search"
  isPlainText = true
  mediaType = "application/json"
  notAlternative = true

[markup]
  [markup.tableOfContents]
    endLevel = 4
    ordered = true
    startLevel = 1


[params]
  mainSections = ["post"]
