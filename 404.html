  function setRandomCovers() {

    const bannerImages = [
      '/images/bg/bg1.webp',
      '/images/bg/bg2.webp',
      '/images/bg/bg3.webp',
      '/images/bg/bg4.webp',
      '/images/bg/bg5.webp',
      '/images/bg/bg6.webp',
      '/images/bg/bg7.webp',
      '/images/bg/bg8.webp'
      // 有更多图片继续追加，如 '/images/bg/bg11.webp'...
    ];

    // 2. 随机选择一张图片
    function getRandomBanner() {
      const randomIndex = Math.floor(Math.random() * bannerImages.length);
      return bannerImages[randomIndex];
    }

    // 3. 替换 header 中的 Banner 图片
    function setRandomBanner() {
      // 匹配 Reimu 主题的头图元素（无需修改，主题默认结构）
      const headerImg = document.querySelector('#header img');
      if (headerImg) {
        const randomBannerUrl = getRandomBanner();
        // 同时设置 src 和 data-src，兼容主题懒加载逻辑
        headerImg.setAttribute('data-src', randomBannerUrl);
        headerImg.src = randomBannerUrl;
        // 强制触发图片显示（覆盖主题默认样式）
        headerImg.style.opacity = '1';
        headerImg.style.visibility = 'visible';
      }
    }

    // 4. 确保脚本在合适时机执行
    // - 页面首次加载完成后执行
    window.addEventListener('DOMContentLoaded', setRandomBanner);
    // - PJAX 跳转后执行（适配主题 PJAX 功能，跳转后仍随机切换）
    document.addEventListener('pjax:complete', setRandomBanner);
    // - 窗口加载完成后兜底执行
    window.addEventListener('load', setRandomBanner);
  })();
</script>
<script>
    (function () {
      
      const twoLineSubtitle = '这里什么也没有，喝杯茶吧<br>Lost? Let’s have tea and figure it out.';

      function setSubtitle() {
        const subtitleEl = document.getElementById('subtitle');
        if (subtitleEl) {
          subtitleEl.innerHTML = twoLineSubtitle;
        }
      }

      
      setSubtitle();

      
      document.addEventListener('pjax:complete', setSubtitle);
    })();
  </script>
</body>
</html>
