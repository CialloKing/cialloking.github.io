<script>
  (function() {
    let animFrame = null;
    let startTime = null;
    const duration1 = 1000;   // 第一阶段 1 秒,第一阶段持续时间（毫秒），例如 1 秒 = 1000
    const duration2 = 2000;   // 第二阶段 2 秒,第二阶段持续时间（毫秒），例如 2 秒 = 2000
    const startOpacity = 1;   // 起始透明度
    const midOpacity = 0.1;   // 中间透明度（第一阶段结束时的值）
    const endOpacity = 0;     // 最终透明度

    function updateOpacity(now) {
      const elapsed = now - startTime;
      let opacity;
      if (elapsed < duration1) {
        // 第一阶段：线性插值 1 -> 0.1
        const t = elapsed / duration1;
        opacity = startOpacity + (midOpacity - startOpacity) * t;
      } else if (elapsed < duration1 + duration2) {
        // 第二阶段：线性插值 0.1 -> 0
        const t = (elapsed - duration1) / duration2;
        opacity = midOpacity + (endOpacity - midOpacity) * t;
      } else {
        opacity = endOpacity;
      }
      const content = document.getElementById('content');
      if (content) content.style.opacity = opacity;
      if (elapsed < duration1 + duration2) {
        animFrame = requestAnimationFrame(updateOpacity);
      }
    }

    function startFade() {
      if (animFrame) cancelAnimationFrame(animFrame);
      const content = document.getElementById('content');
      if (content) content.style.opacity = startOpacity;
      startTime = performance.now();
      animFrame = requestAnimationFrame(updateOpacity);
    }

    function resetOpacity() {
      if (animFrame) cancelAnimationFrame(animFrame);
      const content = document.getElementById('content');
      if (content) content.style.opacity = '1';
    }

    function bindEvents() {
      const header = document.getElementById('header');
      if (!header) return;
      header.removeEventListener('mouseenter', startFade);
      header.removeEventListener('mouseleave', resetOpacity);
      header.addEventListener('mouseenter', startFade);
      header.addEventListener('mouseleave', resetOpacity);
    }

    function init() {
      bindEvents();
      document.addEventListener('pjax:complete', bindEvents);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>

  function setRandomCovers() {
    // 搜索页跳过（已在 single.html 处理）
    if (document.getElementById('search-results')) {
      return;
    }
    const coverImgs = document.querySelectorAll(coverSelectors);
    if (coverImgs.length === 0) {
      setTimeout(setRandomCovers, 150);
      return;
    }
    coverImgs.forEach(img => {
      // 有自定义封面的图片：直接显示，不随机替换
      if (img.hasAttribute('data-custom-cover')) {
        img.style.opacity = '1';
        return;
      }
      // 已经设置过随机封面的图片：不再重复设置
      if (img.hasAttribute('data-cover-set')) {
        return;
      }
      const randomIndex = Math.floor(Math.random() * window.covers.length);
      const newSrc = window.covers[randomIndex];
      img.setAttribute('data-src', newSrc);
      img.src = newSrc;
      img.setAttribute('data-cover-set', 'true');
      img.style.opacity = '1';
      img.style.display = 'block';
      img.style.visibility = 'visible';
    });
  }

  // 【关键修改3】调整执行时机，适配搜索页加载流程
  // 1. 页面加载完成后执行（适配直接打开搜索页）
  window.addEventListener('load', setRandomCovers);
  // 2. PJAX跳转后执行（适配从首页跳转到搜索页）
  document.addEventListener('pjax:complete', setRandomCovers);
  // 3. 搜索框输入后执行（适配动态搜索结果）
  //document.querySelector('.search-input')?.addEventListener('input', () => {
    //setTimeout(setRandomCovers, 200); // 延迟200ms，等待搜索结果渲染

  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      setTimeout(setRandomCovers, 200);
    });
  }



})();
</script>

    '/images/bg/bg33.webp',
    '/images/bg/bg34.webp',
    '/images/bg/bg35.webp'
  ];

  function getRandomBanner() {
    return bannerImages[Math.floor(Math.random() * bannerImages.length)];
  }

  // 立即检查并设置，如果图片已存在
  function setRandomBanner() {
    const headerImg = document.querySelector('#header img');
    if (headerImg && !headerImg.hasAttribute('data-random-set')) {
      const randomUrl = getRandomBanner();
      headerImg.setAttribute('data-src', randomUrl);
      headerImg.src = randomUrl;
      headerImg.setAttribute('data-random-set', 'true');
      headerImg.style.opacity = '1';
      headerImg.style.visibility = 'visible';
    }
  }

  // 使用 MutationObserver 监听 DOM 变化，确保尽早捕捉到 header 图片
  const observer = new MutationObserver((mutations, obs) => {
    const img = document.querySelector('#header img');
    if (img) {
      setRandomBanner();
      obs.disconnect(); // 找到后停止观察
    }
  });
  observer.observe(document.documentElement, { childList: true, subtree: true });

  // 页面完全加载后兜底（防止 observer 遗漏）
  window.addEventListener('load', setRandomBanner);
  // PJAX 跳转后重新设置
  document.addEventListener('pjax:complete', () => {
    // 清除标记，允许重新设置
    const headerImg = document.querySelector('#header img');
    if (headerImg) headerImg.removeAttribute('data-random-set');
    setRandomBanner();
  });
})();
</script>
